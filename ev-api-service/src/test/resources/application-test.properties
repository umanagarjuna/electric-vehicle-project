# Test configuration properties

# Use H2 in-memory database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driver-class-name=org.h2.Driver

# Enable H2 console (useful for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# H2 needs special initialization for PostGIS functionality
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.spatial.dialect.h2geodb.GeoDBDialect

# Hibernate settings for testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Flyway for test database migration
spring.flyway.enabled=false

# PostGIS function definitions for H2
spring.sql.init.platform=h2
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:sql/h2-postgis-init.sql

# Logging level for tests
logging.level.com.ev.apiservice=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO